name: Test

on:
  pull_request:
  push:
    branches: [main]

jobs:
  python-listener:
    name: Python listener tests
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: reference/pi-listener-python
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: '3.12'
          cache: pip
      - run: pip install -r requirements.txt pytest
      - run: pytest -q

  cloud-worker:
    name: Cloudflare Worker tests
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: reference/cloud-worker-cloudflare
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '20'
      - run: npm install
      - run: npm test
